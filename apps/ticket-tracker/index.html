<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT Pit Crew Tracker</title>
  <style>
    :root {
      --bg: #050505;
      --panel: #111111;
      --panel2: #1a1a1a;
      --border: #2a2a2a;
      --text: #ffffff;
      --muted: #b8b8b8;
      --red: #e10600;
      --yellow: #ffb300;
      --green: #00c853;
      --gray: #666666;
      --radius: 16px;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.45);
      --checkered: repeating-linear-gradient(45deg, #111 0px, #111 10px, #fff 10px, #fff 20px);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #000 0%, #0a0a0a 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      margin-bottom: 20px;
      border-bottom: 3px solid var(--red);
      padding-bottom: 12px;
    }

    .hero h1 {
      margin: 0;
      font-size: 2.2rem;
      text-transform: uppercase;
      letter-spacing: -1px;
    }

    .hero p {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .tab-btn {
      background: #181818;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 700;
    }

    .tab-btn.active {
      background: var(--red);
      border-color: var(--red);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .stat {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-left: 4px solid var(--red);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      word-break: break-word;
    }

    .grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 16px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: var(--checkered);
    }

    h2, h3 {
      margin-top: 0;
      margin-bottom: 14px;
    }

    form,
    .toolbar {
      display: grid;
      gap: 10px;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    input,
    select,
    textarea {
      width: 100%;
      background: #000;
      color: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 12px;
      font: inherit;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--red);
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    button {
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 11px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { opacity: 0.92; }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #222;
      border: 1px solid var(--border);
    }

    .toolbar {
      grid-template-columns: minmax(0, 1.5fr) repeat(2, minmax(0, 1fr)) auto;
      margin-bottom: 14px;
    }

    .analytics-toolbar {
      grid-template-columns: repeat(5, minmax(0, 1fr));
      margin-bottom: 0;
    }

    .ticket-list {
      display: grid;
      gap: 12px;
    }

    .ticket {
      background: #0b0b0b;
      border: 1px solid var(--border);
      border-left: 4px solid var(--red);
      border-radius: var(--radius);
      padding: 14px;
    }

    .ticket-title {
      margin: 0 0 6px;
      font-size: 1.05rem;
    }

    .meta {
      color: var(--muted);
      font-size: 0.88rem;
      display: grid;
      gap: 4px;
      margin-bottom: 10px;
    }

    .pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .pill {
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
    }

    .priority-high { background: var(--red); }
    .priority-medium { background: var(--yellow); color: #111; }
    .priority-low { background: var(--green); }
    .status-open { background: var(--gray); }
    .status-in-progress { background: var(--yellow); color: #111; }
    .status-resolved { background: var(--green); }

    .ticket p {
      margin: 0 0 12px;
      line-height: 1.4;
    }

    .ticket-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .empty {
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
    }

    .analytics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    .chart-box {
      background: #0b0b0b;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }

    .chart-box canvas {
      width: 100%;
      height: 260px;
      display: block;
    }

    .legend {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex: 0 0 auto;
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #0b0b0b;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    th,
    td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    th { color: var(--text); }
    td { color: var(--muted); }

    @media (max-width: 1100px) {
      .analytics-toolbar {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 900px) {
      .grid,
      .analytics-grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .toolbar,
      .analytics-toolbar { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .stats,
      .two-col { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>🏁 IT Pit Crew Tracker</h1>
      <p>Fast ticket handling with Formula 1 energy.</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="ticketsTab" type="button">Tickets</button>
      <button class="tab-btn" data-tab="analyticsTab" type="button">Analytics</button>
    </div>

    <div class="tab-panel active" id="ticketsTab">
      <div class="stats" id="stats"></div>

      <div class="grid">
        <div class="card">
          <h2>Create Ticket</h2>
          <form id="ticketForm">
            <input id="title" placeholder="Issue title" required />

            <div class="two-col">
              <input id="customer" placeholder="End user / customer" required />
              <input id="admin" placeholder="Assigned IT admin" required />
            </div>

            <div class="two-col">
              <select id="priority">
                <option value="Medium">Medium Priority</option>
                <option value="Low">Low Priority</option>
                <option value="High">High Priority</option>
              </select>

              <select id="status">
                <option value="Open">Open</option>
                <option value="In Progress">In Progress</option>
                <option value="Resolved">Resolved</option>
              </select>
            </div>

            <textarea id="description" placeholder="Describe the issue"></textarea>

            <div class="two-col">
              <button type="submit">Add Ticket</button>
              <button type="button" class="btn-secondary" id="seedBtn">Load Demo</button>
            </div>
          </form>
        </div>

        <div class="card">
          <h2>Ticket Queue</h2>

          <div class="toolbar">
            <input id="search" placeholder="Search tickets..." />
            <select id="filterStatus">
              <option value="All">All Statuses</option>
              <option value="Open">Open</option>
              <option value="In Progress">In Progress</option>
              <option value="Resolved">Resolved</option>
            </select>
            <select id="filterPriority">
              <option value="All">All Priorities</option>
              <option value="High">High</option>
              <option value="Medium">Medium</option>
              <option value="Low">Low</option>
            </select>
            <button type="button" class="btn-secondary" id="clearAll">Delete All</button>
          </div>

          <div class="ticket-list" id="ticketList"></div>
        </div>
      </div>
    </div>

    <div class="tab-panel" id="analyticsTab">
      <div class="card" style="margin-bottom: 16px;">
        <h2>Analytics Filters</h2>
        <div class="toolbar analytics-toolbar">
          <select id="analyticsStatusFilter">
            <option value="All">All Ticket States</option>
            <option value="Open">Created / Open</option>
            <option value="In Progress">In Progress</option>
            <option value="Resolved">Completed / Resolved</option>
          </select>
          <select id="analyticsAdminFilter">
            <option value="All">All Admins</option>
          </select>
          <button type="button" class="btn-secondary" id="resetAnalyticsFilters">Reset Analytics Filters</button>
          <button type="button" class="btn-secondary" id="exportPdfBtn">Print / Save PDF</button>
          <button type="button" class="btn-secondary" id="saveDataBtn">Save Data Backup</button>
        </div>
      </div>

      <div class="stats" id="analyticsStats"></div>

      <div class="analytics-grid">
        <div class="chart-box">
          <h3>Resolved Tickets by Admin</h3>
          <canvas id="barChart" width="500" height="260"></canvas>
        </div>

        <div class="chart-box">
          <h3>Resolved Share by Admin</h3>
          <canvas id="pieChart" width="500" height="260"></canvas>
          <div class="legend" id="pieLegend"></div>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Admin</th>
              <th>Resolved Tickets</th>
              <th>Avg. Completion Time</th>
            </tr>
          </thead>
          <tbody id="analyticsTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "pitCrewTickets_v4";
    const LEGACY_STORAGE_KEY = "pitCrewTickets_v3";

    const form = document.getElementById("ticketForm");
    const ticketList = document.getElementById("ticketList");
    const stats = document.getElementById("stats");
    const analyticsStats = document.getElementById("analyticsStats");
    const analyticsTableBody = document.getElementById("analyticsTableBody");
    const pieLegend = document.getElementById("pieLegend");

    const titleEl = document.getElementById("title");
    const customerEl = document.getElementById("customer");
    const adminEl = document.getElementById("admin");
    const priorityEl = document.getElementById("priority");
    const statusEl = document.getElementById("status");
    const descriptionEl = document.getElementById("description");

    const searchEl = document.getElementById("search");
    const filterStatusEl = document.getElementById("filterStatus");
    const filterPriorityEl = document.getElementById("filterPriority");

    const clearAllBtn = document.getElementById("clearAll");
    const seedBtn = document.getElementById("seedBtn");
    const analyticsStatusFilterEl = document.getElementById("analyticsStatusFilter");
    const analyticsAdminFilterEl = document.getElementById("analyticsAdminFilter");
    const resetAnalyticsFiltersBtn = document.getElementById("resetAnalyticsFilters");
    const exportPdfBtn = document.getElementById("exportPdfBtn");
    const saveDataBtn = document.getElementById("saveDataBtn");

    const chartColors = ["#e10600", "#ffb300", "#00c853", "#2d7ff9", "#9c27b0", "#ff6f61", "#26c6da", "#8bc34a"];

    function loadTickets() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY) ?? localStorage.getItem(LEGACY_STORAGE_KEY) ?? "[]";
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    let tickets = loadTickets();

    function saveTickets() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tickets));
    }

    function makeId() {
      return Date.now().toString() + Math.random().toString(16).slice(2);
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(dateValue) {
      if (!dateValue) return "—";
      const d = new Date(dateValue);
      if (Number.isNaN(d.getTime())) return "—";
      return d.toLocaleString(undefined, { dateStyle: "medium", timeStyle: "short" });
    }

    function formatDuration(ms) {
      if (ms == null || !Number.isFinite(ms) || ms < 0) return "—";
      const totalMinutes = Math.max(0, Math.round(ms / 60000));
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;
      if (hours === 0) return `${minutes} min`;
      return minutes === 0 ? `${hours} hr` : `${hours} hr ${minutes} min`;
    }

    function truncateLabel(value, max = 14) {
      return value.length > max ? `${value.slice(0, max - 1)}…` : value;
    }

    function updateStats() {
      const total = tickets.length;
      const open = tickets.filter(ticket => ticket.status === "Open").length;
      const inProgress = tickets.filter(ticket => ticket.status === "In Progress").length;
      const resolved = tickets.filter(ticket => ticket.status === "Resolved").length;

      stats.innerHTML = `
        <div class="stat"><div class="stat-label">Total</div><div class="stat-value">${total}</div></div>
        <div class="stat"><div class="stat-label">Open</div><div class="stat-value">${open}</div></div>
        <div class="stat"><div class="stat-label">In Progress</div><div class="stat-value">${inProgress}</div></div>
        <div class="stat"><div class="stat-label">Resolved</div><div class="stat-value">${resolved}</div></div>
      `;
    }

    function getFilteredTickets() {
      const search = searchEl.value.toLowerCase().trim();
      const statusFilter = filterStatusEl.value;
      const priorityFilter = filterPriorityEl.value;

      return tickets
        .filter(ticket => {
          const matchesSearch =
            !search ||
            ticket.title.toLowerCase().includes(search) ||
            ticket.customer.toLowerCase().includes(search) ||
            ticket.admin.toLowerCase().includes(search) ||
            (ticket.description || "").toLowerCase().includes(search);

          const matchesStatus = statusFilter === "All" || ticket.status === statusFilter;
          const matchesPriority = priorityFilter === "All" || ticket.priority === priorityFilter;

          return matchesSearch && matchesStatus && matchesPriority;
        })
        .slice()
        .reverse();
    }

    function getActionButtons(ticket) {
      if (ticket.status === "Open") {
        return `
          <button type="button" data-action="advance" data-id="${escapeHtml(ticket.id)}">Start Work</button>
          <button type="button" class="btn-secondary" data-action="delete" data-id="${escapeHtml(ticket.id)}">Delete</button>
        `;
      }

      if (ticket.status === "In Progress") {
        return `
          <button type="button" data-action="advance" data-id="${escapeHtml(ticket.id)}">Mark Resolved</button>
          <button type="button" class="btn-secondary" data-action="delete" data-id="${escapeHtml(ticket.id)}">Delete</button>
        `;
      }

      return `
        <button type="button" disabled>Resolved</button>
        <button type="button" class="btn-secondary" data-action="reopen" data-id="${escapeHtml(ticket.id)}">Reopen</button>
        <button type="button" class="btn-secondary" data-action="delete" data-id="${escapeHtml(ticket.id)}">Delete</button>
      `;
    }

    function renderTickets() {
      updateStats();
      const filtered = getFilteredTickets();

      if (filtered.length === 0) {
        ticketList.innerHTML = `<div class="empty">No tickets found.</div>`;
        return;
      }

      ticketList.innerHTML = filtered.map(ticket => `
        <div class="ticket">
          <h3 class="ticket-title">${escapeHtml(ticket.title)}</h3>

          <div class="meta">
            <div><strong>Customer:</strong> ${escapeHtml(ticket.customer)}</div>
            <div><strong>IT Admin:</strong> ${escapeHtml(ticket.admin)}</div>
            <div><strong>Created:</strong> ${escapeHtml(formatDate(ticket.createdAt))}</div>
            <div><strong>Resolved:</strong> ${escapeHtml(formatDate(ticket.resolvedAt))}</div>
          </div>

          <div class="pills">
            <span class="pill priority-${ticket.priority.toLowerCase()}">${escapeHtml(ticket.priority)} Priority</span>
            <span class="pill status-${ticket.status.toLowerCase().replaceAll(" ", "-")}">${escapeHtml(ticket.status)}</span>
          </div>

          <p>${escapeHtml(ticket.description || "No description.")}</p>

          <div class="ticket-actions">
            ${getActionButtons(ticket)}
          </div>
        </div>
      `).join("");
    }

    function getAnalyticsData() {
      const statusFilter = analyticsStatusFilterEl.value;
      const adminFilter = analyticsAdminFilterEl.value;

      const relevantTickets = tickets.filter(ticket => {
        const matchesStatus = statusFilter === "All" || ticket.status === statusFilter;
        const matchesAdmin = adminFilter === "All" || ticket.admin === adminFilter;
        return matchesStatus && matchesAdmin;
      });

      const byAdmin = {};

      relevantTickets.forEach(ticket => {
        const admin = ticket.admin || "Unknown";
        const created = new Date(ticket.createdAt).getTime();
        const resolved = ticket.resolvedAt ? new Date(ticket.resolvedAt).getTime() : null;
        const duration = resolved ? Math.max(resolved - created, 0) : null;

        if (!byAdmin[admin]) {
          byAdmin[admin] = {
            admin,
            ticketCount: 0,
            completedCount: 0,
            totalDuration: 0,
            durationCount: 0
          };
        }

        byAdmin[admin].ticketCount += 1;

        if (ticket.status === "Resolved" && duration != null) {
          byAdmin[admin].completedCount += 1;
          byAdmin[admin].totalDuration += duration;
          byAdmin[admin].durationCount += 1;
        }
      });

      return Object.values(byAdmin)
        .map(item => ({
          admin: item.admin,
          ticketCount: item.ticketCount,
          completedCount: item.completedCount,
          totalDuration: item.totalDuration,
          durationCount: item.durationCount,
          avgDuration: item.durationCount ? item.totalDuration / item.durationCount : null
        }))
        .sort((a, b) => {
          return (b.completedCount - a.completedCount) ||
            (b.ticketCount - a.ticketCount) ||
            a.admin.localeCompare(b.admin);
        });
    }

    function renderAnalyticsStats(data) {
      const totalTickets = data.reduce((sum, item) => sum + item.ticketCount, 0);
      const totalCompleted = data.reduce((sum, item) => sum + item.completedCount, 0);
      const totalDuration = data.reduce((sum, item) => sum + item.totalDuration, 0);
      const totalDurationCount = data.reduce((sum, item) => sum + item.durationCount, 0);
      const avgAll = totalDurationCount ? totalDuration / totalDurationCount : null;
      const topResolver = data.find(item => item.completedCount > 0)?.admin || "—";

      analyticsStats.innerHTML = `
        <div class="stat"><div class="stat-label">Filtered Tickets</div><div class="stat-value">${totalTickets}</div></div>
        <div class="stat"><div class="stat-label">Completed in Filter</div><div class="stat-value">${totalCompleted}</div></div>
        <div class="stat"><div class="stat-label">Avg Completion Time</div><div class="stat-value">${escapeHtml(formatDuration(avgAll))}</div></div>
        <div class="stat"><div class="stat-label">Top Resolver</div><div class="stat-value">${escapeHtml(topResolver)}</div></div>
      `;
    }

    function renderAnalyticsTable(data) {
      if (data.length === 0) {
        analyticsTableBody.innerHTML = `<tr><td colspan="3">No tickets found for this filter.</td></tr>`;
        return;
      }

      analyticsTableBody.innerHTML = data.map(item => `
        <tr>
          <td>${escapeHtml(item.admin)}</td>
          <td>${item.completedCount}</td>
          <td>${escapeHtml(formatDuration(item.avgDuration))}</td>
        </tr>
      `).join("");
    }

    function drawBarChart(data) {
      const canvas = document.getElementById("barChart");
      const ctx = canvas.getContext("2d");
      const resolvedData = data.filter(item => item.completedCount > 0);

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ffffff";

      if (resolvedData.length === 0) {
        ctx.font = "16px Arial";
        ctx.fillText("No resolved tickets yet.", 20, 40);
        return;
      }

      const max = Math.max(...resolvedData.map(item => item.completedCount), 1);
      const padding = { left: 50, right: 20, top: 20, bottom: 55 };
      const chartWidth = canvas.width - padding.left - padding.right;
      const chartHeight = canvas.height - padding.top - padding.bottom;
      const barGap = resolvedData.length > 1 ? 16 : 0;
      const barWidth = Math.max(28, (chartWidth - (resolvedData.length - 1) * barGap) / resolvedData.length);

      ctx.strokeStyle = "#666";
      ctx.beginPath();
      ctx.moveTo(padding.left, padding.top);
      ctx.lineTo(padding.left, padding.top + chartHeight);
      ctx.lineTo(padding.left + chartWidth, padding.top + chartHeight);
      ctx.stroke();

      resolvedData.forEach((item, index) => {
        const x = padding.left + index * (barWidth + barGap);
        const barHeight = (chartHeight * item.completedCount) / max;
        const y = padding.top + chartHeight - barHeight;

        ctx.fillStyle = chartColors[index % chartColors.length];
        ctx.fillRect(x, y, barWidth, barHeight);

        ctx.fillStyle = "#fff";
        ctx.font = "12px Arial";
        ctx.textAlign = "center";
        ctx.fillText(String(item.completedCount), x + barWidth / 2, y - 8);

        ctx.save();
        ctx.translate(x + barWidth / 2, padding.top + chartHeight + 18);
        ctx.rotate(-0.35);
        ctx.textAlign = "right";
        ctx.fillText(truncateLabel(item.admin), 0, 0);
        ctx.restore();
      });
    }

    function drawPieChart(data) {
      const canvas = document.getElementById("pieChart");
      const ctx = canvas.getContext("2d");
      const resolvedData = data.filter(item => item.completedCount > 0);

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pieLegend.innerHTML = "";

      if (resolvedData.length === 0) {
        ctx.fillStyle = "#ffffff";
        ctx.font = "16px Arial";
        ctx.fillText("No resolved tickets yet.", 20, 40);
        return;
      }

      const total = resolvedData.reduce((sum, item) => sum + item.completedCount, 0);
      let startAngle = -Math.PI / 2;
      const centerX = 170;
      const centerY = 130;
      const radius = 90;

      resolvedData.forEach((item, index) => {
        const slice = (item.completedCount / total) * Math.PI * 2;
        const color = chartColors[index % chartColors.length];

        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, startAngle, startAngle + slice);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();

        startAngle += slice;

        const percentage = Math.round((item.completedCount / total) * 100);
        pieLegend.innerHTML += `
          <div class="legend-item">
            <span class="legend-swatch" style="background:${color}"></span>
            <span>${escapeHtml(item.admin)} — ${item.completedCount} (${percentage}%)</span>
          </div>
        `;
      });
    }

    function populateAnalyticsAdminFilter() {
      const admins = Array.from(new Set(tickets.map(ticket => ticket.admin).filter(Boolean))).sort();
      const current = analyticsAdminFilterEl.value;

      analyticsAdminFilterEl.innerHTML = '<option value="All">All Admins</option>' + admins
        .map(admin => `<option value="${escapeHtml(admin)}">${escapeHtml(admin)}</option>`)
        .join("");

      if (admins.includes(current)) {
        analyticsAdminFilterEl.value = current;
      } else {
        analyticsAdminFilterEl.value = "All";
      }
    }

    function downloadFile(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function exportPdfReport() {
      const now = new Date();
      const filteredTickets = getFilteredTickets();
      const analyticsData = getAnalyticsData();
      const totalTickets = tickets.length;
      const openCount = tickets.filter(ticket => ticket.status === "Open").length;
      const inProgressCount = tickets.filter(ticket => ticket.status === "In Progress").length;
      const resolvedCount = tickets.filter(ticket => ticket.status === "Resolved").length;

      const ticketFilterSummary = `Search: ${searchEl.value || "None"} | Status: ${filterStatusEl.value} | Priority: ${filterPriorityEl.value}`;
      const analyticsFilterSummary = `Status: ${analyticsStatusFilterEl.value} | Admin: ${analyticsAdminFilterEl.value}`;

      const rowsHtml = filteredTickets.map(ticket => `
        <tr>
          <td>${escapeHtml(ticket.title)}</td>
          <td>${escapeHtml(ticket.customer)}</td>
          <td>${escapeHtml(ticket.admin)}</td>
          <td>${escapeHtml(ticket.priority)}</td>
          <td>${escapeHtml(ticket.status)}</td>
          <td>${escapeHtml(formatDate(ticket.createdAt))}</td>
          <td>${escapeHtml(formatDate(ticket.resolvedAt))}</td>
        </tr>
      `).join("") || '<tr><td colspan="7">No tickets in current filtered view.</td></tr>';

      const analyticsRowsHtml = analyticsData.map(item => `
        <tr>
          <td>${escapeHtml(item.admin)}</td>
          <td>${item.ticketCount}</td>
          <td>${item.completedCount}</td>
          <td>${escapeHtml(formatDuration(item.avgDuration))}</td>
        </tr>
      `).join("") || '<tr><td colspan="4">No analytics data available.</td></tr>';

      const reportHtml = `
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>IT Pit Crew Tracker Report</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; color: #111; }
    h1, h2 { margin-bottom: 8px; }
    .meta { margin-bottom: 10px; color: #444; }
    .filters { margin-bottom: 18px; color: #444; font-size: 12px; }
    .stats { display: flex; gap: 12px; flex-wrap: wrap; margin: 16px 0 24px; }
    .stat { border: 1px solid #ccc; border-left: 4px solid #e10600; padding: 10px 12px; min-width: 120px; }
    .label { font-size: 12px; color: #555; }
    .value { font-size: 20px; font-weight: bold; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; margin-bottom: 24px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; font-size: 12px; }
    th { background: #f3f3f3; }
  </style>
</head>
<body>
  <h1>IT Pit Crew Tracker Report</h1>
  <div class="meta">Generated: ${escapeHtml(now.toLocaleString(undefined, { dateStyle: "medium", timeStyle: "short" }))}</div>
  <div class="filters"><strong>Ticket Filters:</strong> ${escapeHtml(ticketFilterSummary)}<br><strong>Analytics Filters:</strong> ${escapeHtml(analyticsFilterSummary)}</div>

  <div class="stats">
    <div class="stat"><div class="label">Total Tickets</div><div class="value">${totalTickets}</div></div>
    <div class="stat"><div class="label">Open</div><div class="value">${openCount}</div></div>
    <div class="stat"><div class="label">In Progress</div><div class="value">${inProgressCount}</div></div>
    <div class="stat"><div class="label">Resolved</div><div class="value">${resolvedCount}</div></div>
  </div>

  <h2>Ticket View Export</h2>
  <table>
    <thead>
      <tr>
        <th>Title</th><th>Customer</th><th>Admin</th><th>Priority</th><th>Status</th><th>Created</th><th>Resolved</th>
      </tr>
    </thead>
    <tbody>${rowsHtml}</tbody>
  </table>

  <h2>Analytics Summary</h2>
  <table>
    <thead>
      <tr><th>Admin</th><th>Tickets in Filter</th><th>Resolved</th><th>Avg Completion Time</th></tr>
    </thead>
    <tbody>${analyticsRowsHtml}</tbody>
  </table>
</body>
</html>`;

      const printWindow = window.open("", "_blank");
      if (!printWindow) {
        alert("Popup blocked. Please allow popups to print or save the report as PDF.");
        return;
      }

      let printed = false;
      const triggerPrint = () => {
        if (printed) return;
        printed = true;
        printWindow.focus();
        printWindow.print();
      };

      printWindow.document.open();
      printWindow.document.write(reportHtml);
      printWindow.document.close();
      printWindow.onload = triggerPrint;
      setTimeout(triggerPrint, 300);
    }

    function saveDataBackup() {
      const backup = {
        exportedAt: new Date().toISOString(),
        app: "IT Pit Crew Tracker",
        version: "v5",
        tickets,
        filters: {
          ticketSearch: searchEl.value,
          ticketStatus: filterStatusEl.value,
          ticketPriority: filterPriorityEl.value,
          analyticsStatus: analyticsStatusFilterEl.value,
          analyticsAdmin: analyticsAdminFilterEl.value
        }
      };

      downloadFile(
        `pit-crew-backup-${new Date().toISOString().slice(0, 10)}.json`,
        JSON.stringify(backup, null, 2),
        "application/json"
      );
    }

    function renderAnalytics() {
      populateAnalyticsAdminFilter();
      const data = getAnalyticsData();
      renderAnalyticsStats(data);
      renderAnalyticsTable(data);
      drawBarChart(data);
      drawPieChart(data);
    }

    function advanceStatus(id) {
      tickets = tickets.map(ticket => {
        if (ticket.id !== id) return ticket;

        const nextStatus = ticket.status === "Open"
          ? "In Progress"
          : ticket.status === "In Progress"
            ? "Resolved"
            : "Resolved";

        return {
          ...ticket,
          status: nextStatus,
          resolvedAt: nextStatus === "Resolved"
            ? (ticket.resolvedAt || new Date().toISOString())
            : null
        };
      });

      saveTickets();
      renderTickets();
      renderAnalytics();
    }

    function reopenTicket(id) {
      tickets = tickets.map(ticket => {
        if (ticket.id !== id) return ticket;
        return {
          ...ticket,
          status: "Open",
          resolvedAt: null
        };
      });

      saveTickets();
      renderTickets();
      renderAnalytics();
    }

    function deleteTicket(id) {
      const ok = confirm("Delete this ticket?");
      if (!ok) return;
      tickets = tickets.filter(ticket => ticket.id !== id);
      saveTickets();
      renderTickets();
      renderAnalytics();
    }

    function loadDemoTickets() {
      const now = Date.now();
      const demo = [
        {
          id: makeId(),
          title: "Outlook not syncing",
          customer: "Ashley",
          admin: "Santiago",
          priority: "High",
          status: "Resolved",
          description: "User is not receiving new emails unless Outlook is restarted.",
          createdAt: new Date(now - 1000 * 60 * 130).toISOString(),
          resolvedAt: new Date(now - 1000 * 60 * 20).toISOString()
        },
        {
          id: makeId(),
          title: "VPN access setup",
          customer: "Remote Contractor",
          admin: "Rory",
          priority: "Medium",
          status: "Resolved",
          description: "Need secure remote access configured before Monday.",
          createdAt: new Date(now - 1000 * 60 * 420).toISOString(),
          resolvedAt: new Date(now - 1000 * 60 * 120).toISOString()
        },
        {
          id: makeId(),
          title: "Printer offline",
          customer: "Concierge Desk",
          admin: "Santiago",
          priority: "Low",
          status: "In Progress",
          description: "Conference room printer showing offline after reboot.",
          createdAt: new Date(now - 1000 * 60 * 50).toISOString(),
          resolvedAt: null
        }
      ];

      const existing = new Set(tickets.map(ticket => `${ticket.title}|${ticket.customer}|${ticket.admin}`));
      const uniqueDemo = demo.filter(ticket => !existing.has(`${ticket.title}|${ticket.customer}|${ticket.admin}`));

      tickets = [...tickets, ...uniqueDemo];
      saveTickets();
      renderTickets();
      renderAnalytics();
    }

    form.addEventListener("submit", event => {
      event.preventDefault();

      const ticket = {
        id: makeId(),
        title: titleEl.value.trim(),
        customer: customerEl.value.trim(),
        admin: adminEl.value.trim(),
        priority: priorityEl.value,
        status: statusEl.value,
        description: descriptionEl.value.trim(),
        createdAt: new Date().toISOString(),
        resolvedAt: statusEl.value === "Resolved" ? new Date().toISOString() : null
      };

      if (!ticket.title || !ticket.customer || !ticket.admin) {
        alert("Fill out title, customer, and IT admin.");
        return;
      }

      tickets.push(ticket);
      saveTickets();
      renderTickets();
      renderAnalytics();
      form.reset();
      priorityEl.value = "Medium";
      statusEl.value = "Open";
    });

    [searchEl, filterStatusEl, filterPriorityEl].forEach(element => {
      element.addEventListener("input", renderTickets);
      element.addEventListener("change", renderTickets);
    });

    clearAllBtn.addEventListener("click", () => {
      const ok = confirm("Delete all tickets?");
      if (!ok) return;
      tickets = [];
      saveTickets();
      renderTickets();
      renderAnalytics();
    });

    seedBtn.addEventListener("click", loadDemoTickets);

    [analyticsStatusFilterEl, analyticsAdminFilterEl].forEach(element => {
      element.addEventListener("input", renderAnalytics);
      element.addEventListener("change", renderAnalytics);
    });

    resetAnalyticsFiltersBtn.addEventListener("click", () => {
      analyticsStatusFilterEl.value = "All";
      analyticsAdminFilterEl.value = "All";
      renderAnalytics();
    });

    exportPdfBtn.addEventListener("click", exportPdfReport);
    saveDataBtn.addEventListener("click", saveDataBackup);

    ticketList.addEventListener("click", event => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;

      const { action, id } = button.dataset;
      if (!id) return;

      if (action === "advance") advanceStatus(id);
      if (action === "reopen") reopenTicket(id);
      if (action === "delete") deleteTicket(id);
    });

    document.querySelectorAll(".tab-btn").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
        document.querySelectorAll(".tab-panel").forEach(panel => panel.classList.remove("active"));
        button.classList.add("active");
        document.getElementById(button.dataset.tab).classList.add("active");
        if (button.dataset.tab === "analyticsTab") {
          renderAnalytics();
        }
      });
    });

    renderTickets();
    renderAnalytics();
  </script>
</body>
</html>
