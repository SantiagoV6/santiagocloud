<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uptime Monitor — Santiago's Portfolio</title>
    <style>
      :root {
        --bg: #000;
        --text: #fafafa;
        --muted: #a3a3a3;
        --accent: #3b82f6;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .wrap {
        max-width: 640px;
        margin: 0 auto;
        padding: 48px 24px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.75rem;
        letter-spacing: -0.03em;
      }
      .desc {
        color: var(--muted);
        margin: 0 0 24px;
      }
      .back {
        display: inline-block;
        margin-bottom: 32px;
        color: var(--muted);
        font-size: 0.9rem;
      }
      .back:hover {
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <a class="back" href="../">← All apps</a>
      <h1>Uptime Monitor</h1>
      <p class="desc">Check whether a URL responds.</p>
      <p>This page is ready for your UI. Replace this placeholder when you build the app.</p>
    </div>
  </body>
</html>
